version: '3.8'
services:
  activepieces:
    image: activepieces/activepieces:latest
    container_name: lazyclaw-activepieces
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - AP_ENGINE_EXECUTABLE_PATH=dist/packages/engine/main.js
      - AP_ENVIRONMENT=prod
      - AP_FRONTEND_URL=http://localhost:8080
      - AP_WEBHOOK_TIMEOUT_SECONDS=30
      - AP_TRIGGER_DEFAULT_POLL_INTERVAL=5
      - AP_POSTGRES_DATABASE=activepieces
      - AP_POSTGRES_HOST=postgres
      - AP_POSTGRES_PORT=5432
      - AP_POSTGRES_USERNAME=activepieces
      - AP_POSTGRES_PASSWORD=activepieces
      - AP_REDIS_HOST=redis
      - AP_REDIS_PORT=6379
      - AP_ENCRYPTION_KEY=31ad670295a3dee2505183634641b59a
      - AP_JWT_SECRET=2324f73f8d6796377cde14f2c04848b7
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: lazyclaw-ap-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=activepieces
      - POSTGRES_USER=activepieces
      - POSTGRES_PASSWORD=activepieces
    volumes:
      - ap_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: lazyclaw-ap-redis
    restart: unless-stopped
    volumes:
      - ap_redis_data:/data

volumes:
  ap_postgres_data:
  ap_redis_data:
