services:
  lazyclaw:
    build: .
    container_name: lazyclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./skills:/app/skills

  lazyclaw-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: lazyclaw-web
    restart: unless-stopped
    ports:
      - "3001:80"

  n8n:
    image: n8nio/n8n:latest
    container_name: lazyclaw-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
