server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed bundles in /assets/ — Vite mints a new filename per build,
    # so they're safe to cache for a year. immutable tells the browser
    # not to bother revalidating until the URL itself changes.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # index.html — must always re-fetch so a new build is picked up
    # immediately. Without this the browser caches index.html for
    # hours and keeps loading the OLD hashed bundle reference.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://lazyclaw:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /ws/ {
        proxy_pass http://lazyclaw:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
