services:
  lazyclaw:
    build: .
    container_name: lazyclaw
    restart: unless-stopped
    mem_limit: 2g
    shm_size: '1gb'
    ports:
      - "18789:18789"
      - "6080:6080"    # noVNC remote takeover (browser control from phone)
      - "8000:8000"    # workspace-mcp OAuth callback (MinimalOAuthServer, stdio mode)
    # host.docker.internal lets the container reach services on the host Mac/Linux
    # box (the user's real Brave running with --remote-debugging-port=9222 for
    # the host-browser bridge). Docker Desktop for Mac/Windows sets this
    # automatically; bare-Linux Docker needs the explicit mapping below.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    environment:
      # n8n MCP connection (inside docker network)
      - N8N_HOST=http://lazyclaw-n8n:5678
      # Ollama runs on the host Mac — reach it via Docker's host gateway
      - OLLAMA_HOST=http://host.docker.internal:11434
      # Enable server mode for VNC remote takeover in Docker
      - LAZYCLAW_SERVER_MODE=true
      # workspace-mcp: bind the OAuth callback server to 0.0.0.0 so Docker
      # port-forwarding from host:8000 can reach it. The redirect URI that
      # Google sees must stay `localhost` (what's registered in GCP), so
      # override that explicitly — otherwise workspace-mcp would derive
      # it from WORKSPACE_MCP_BASE_URI and Google would reject.
      - WORKSPACE_MCP_BASE_URI=http://0.0.0.0
      - GOOGLE_OAUTH_REDIRECT_URI=http://localhost:8000/oauth2callback
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./data:/app/data
      - ./skills:/app/skills
      - ~/.claude:/home/lazyclaw/.claude:ro  # Mount Claude auth (Max subscription)
      - ${HOME}/Desktop:/host/Desktop
      # Google Workspace OAuth credentials (shared with workspace-mcp MCP server).
      # Cached token lives at ~/.google_workspace_mcp/credentials/{email}.json
      # on the host; mounting it in means no re-consent is needed after rebuild.
      - ${HOME}/.google_workspace_mcp:/home/lazyclaw/.google_workspace_mcp
  lazyclaw-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: lazyclaw-web
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - "3001:80"

  n8n:
    build:
      context: ./n8n-custom
      dockerfile: Dockerfile
    image: lazyclaw-n8n:custom
    container_name: lazyclaw-n8n
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_SECURE_COOKIE=false
      # API access for LazyClaw integration
      - N8N_PUBLIC_API_DISABLED=false
      # Hide AI/Agent features — LazyClaw is the AI brain, n8n is workflow-only
      - N8N_AI_ENABLED=false
      - N8N_AI_ASSISTANT_ENABLED=false
      - N8N_HIDE_USAGE_PAGE=true
      - N8N_TEMPLATES_ENABLED=false
      # Remove all LangChain/AI nodes from palette (agents, chat, LLMs)
      - 'NODES_EXCLUDE=["@n8n/n8n-nodes-langchain"]'
      # Disable AI chat beta and assistant
      - N8N_PERSONALIZATION_SURVEY_ENABLED=false
      - N8N_AI_CHAT_ENABLED=false
      - N8N_FEATURE_AI_ENABLED=false
      - 'N8N_EDITOR_SETTINGS={"aiAssistant":{"enabled":false},"aiChat":{"enabled":false}}'
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
