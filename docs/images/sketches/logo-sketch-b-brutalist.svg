<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!--
    Sketch B: Brutalist Terminal Wordmark
    No mark at all — typography is the whole logo. Phosphor green on near-
    black, all lowercase, chunky mono, stacked two lines with a solid cursor
    block. Hacker/CLI aesthetic. Premise: the Python-native/terminal
    audience is the early adopter wave, so speak their visual language.
  -->
  <rect width="240" height="240" fill="#0b0b0b"/>

  <!-- Top + bottom hairline rules (brutalist anchor) -->
  <rect x="20" y="38" width="200" height="1" fill="#00ff66" opacity="0.4"/>
  <rect x="20" y="202" width="200" height="1" fill="#00ff66" opacity="0.4"/>

  <!-- Wordmark stacked -->
  <text x="24" y="110"
        font-family="'JetBrains Mono', 'SF Mono', Menlo, ui-monospace, monospace"
        font-weight="800" font-size="58" fill="#00ff66" letter-spacing="-3">lazy</text>
  <text x="24" y="172"
        font-family="'JetBrains Mono', 'SF Mono', Menlo, ui-monospace, monospace"
        font-weight="800" font-size="58" fill="#00ff66" letter-spacing="-3">claw</text>

  <!-- Solid cursor block after 'claw' -->
  <rect x="170" y="128" width="30" height="46" fill="#00ff66"/>

  <!-- Tiny CLI-prompt detail -->
  <text x="24" y="220"
        font-family="'JetBrains Mono', monospace"
        font-weight="400" font-size="9" fill="#00ff66" opacity="0.55">$ lazyclaw --encrypted</text>
</svg>
