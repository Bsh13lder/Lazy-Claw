version: '3.8'

services:
  lazyclaw:
    build: .
    container_name: lazyclaw
    restart: unless-stopped
    ports:
      - "18789:18789"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./skills:/app/skills
    depends_on:
      - activepieces

  lazyclaw-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: lazyclaw-web
    restart: unless-stopped
    ports:
      - "3000:80"

  activepieces:
    image: activepieces/activepieces:latest
    container_name: lazyclaw-activepieces
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - AP_ENGINE_EXECUTABLE_PATH=dist/packages/engine/main.js
      - AP_ENVIRONMENT=prod
      - AP_FRONTEND_URL=http://localhost:8080
      - AP_WEBHOOK_TIMEOUT_SECONDS=30
      - AP_TRIGGER_DEFAULT_POLL_INTERVAL=5
      - AP_POSTGRES_DATABASE=activepieces
      - AP_POSTGRES_HOST=postgres
      - AP_POSTGRES_PORT=5432
      - AP_POSTGRES_USERNAME=activepieces
      - AP_POSTGRES_PASSWORD=activepieces
      - AP_REDIS_HOST=redis
      - AP_REDIS_PORT=6379
      - AP_ENCRYPTION_KEY=${AP_ENCRYPTION_KEY}
      - AP_JWT_SECRET=${AP_JWT_SECRET}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: lazyclaw-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=activepieces
      - POSTGRES_USER=activepieces
      - POSTGRES_PASSWORD=activepieces
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lazyclaw-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
